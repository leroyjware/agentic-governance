# Example alert rules — copy into your Prometheus rule_files.
# Not loaded by default docker-compose.obs.yml (keeps the stack thin).
groups:
  - name: agentic-governance
    rules:
      - alert: AgenticGovernanceHighPhiBlocks
        expr: increase(agent_phi_violations_total[15m]) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Elevated PHI/isolation blocks
          description: >
            More than 20 isolation blocks in 15m. Expected under load tests;
            investigate if correlated with successful ok responses leaking scope.

      - alert: AgenticGovernanceLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(agent_request_latency_seconds_bucket[5m])) by (le)) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: p95 latency above 5s
          description: Graph-mode LLM calls can be slow; alert on regressions vs your baseline.
