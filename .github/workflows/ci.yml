name: AI SDLC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance-gates:
    runs-on: ubuntu-latest
    env:
      AGENT_MODE: rules
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit + integration tests
        run: pytest tests/ -q

      - name: PHI leakage gate
        run: python evaluation/phi.py

      - name: Hallucination gate
        run: python evaluation/hallucination.py

      - name: Grounding gate
        run: python evaluation/grounding.py

      - name: Latency gate
        run: python evaluation/latency.py

      - name: Import LangGraph stack
        run: python -c "from agent.graph import graph_available; assert graph_available()"
