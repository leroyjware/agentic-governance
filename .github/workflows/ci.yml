name: AI SDLC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Always runs — no LLM spend. Deterministic governance gates.
  governance-gates:
    runs-on: ubuntu-latest
    env:
      AGENT_MODE: rules
      PYTHONPATH: .
      AUDIT_LOG_PATH: off
      AUTH_STRICT: "0"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint

      - name: Harness validate (structural)
        run: python scripts/validate_harness.py

      - name: Static PHI hygiene
        run: python scripts/static_phi_hygiene.py

      - name: Unit + integration tests
        run: pytest tests/ -q

      - name: PHI leakage gate
        run: python evaluation/phi.py

      - name: Hallucination gate
        run: python evaluation/hallucination.py

      - name: Grounding gate
        run: python evaluation/grounding.py

      - name: Latency gate
        run: python evaluation/latency.py

      - name: Prompt regression gate
        run: python evaluation/prompt_regression.py

      - name: Claims vertical regression
        run: python evaluation/claims_regression.py

      - name: Import LangGraph stack
        run: python -c "from agent.graph import graph_available; assert graph_available()"

  # Optional live LLM — runs when GROQ_API_KEY (or OPENAI_API_KEY) is set as a repo secret.
  live-langgraph:
    runs-on: ubuntu-latest
    needs: governance-gates
    env:
      PYTHONPATH: .
      AGENT_MODE: graph
      AUDIT_LOG_PATH: off
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Skip if no LLM secret
        id: check
        run: |
          if [ -n "$GROQ_API_KEY" ] || [ -n "$OPENAI_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No GROQ_API_KEY or OPENAI_API_KEY secret — skipping live LangGraph job."
          fi

      - name: Live LangGraph cases (Groq / OpenAI)
        if: steps.check.outputs.has_key == 'true'
        run: python scripts/live_graph_cases.py
